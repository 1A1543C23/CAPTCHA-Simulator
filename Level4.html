<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>第4关：要致富先撸树</title>
    <style>
        body { margin: 0; padding: 0; background-color: #87CEEB; /* MC天空蓝 */ color: #fff; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; user-select: none; text-align: center; }
        
        .game-area { display: flex; gap: 30px; align-items: center; }
        
        /* 树木样式 */
        .tree { width: 100px; height: 150px; background: #8B4513; /* 树干棕 */ border: 4px solid #5c2e0b; cursor: pointer; transition: background 0.1s; display: flex; justify-content: center; align-items: center; font-size: 16px; font-weight: bold; color: #fff; text-shadow: 1px 1px 2px #000;}
        .tree:hover { background: #a0522d; }
        .tree:active { transform: scale(0.95); /* 点击时的回弹效果 */ }
        .tree.chopped { background: #5c2e0b; } /* 砍过的颜色 */

        /* 物品栏样式 */
        .inventory { display: flex; flex-direction: column; gap: 10px; background: #555; padding: 15px; border-radius: 5px; border: 2px solid #333;}
        .inv-slot { width: 60px; height: 60px; background: #444; border: 2px solid #222; display: flex; justify-content: center; align-items: center; font-size: 30px;}
        .inv-count { font-size: 14px; color: #fff; margin-top: 5px;}

        .next-btn { display: none; padding: 15px 30px; background: #55FF55; color: #000; font-size: 20px; border: none; cursor: pointer; font-weight: bold; text-decoration: none; margin-top: 30px; animation: pulse 1s infinite;}
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        p.hint { color: #333; margin-bottom: 10px; height: 20px; font-size: 16px; font-weight: bold;}
    </style>
</head>
<body>
    <div>
        <h2>第4关：要致富先撸树</h2>
        <p class="hint" id="hintText">点击树干收集 10 个木头过关！</p>
        
        <div class="game-area">
            <!-- 树干 -->
            <div class="tree" id="treeBlock" onclick="chopTree()">橡木</div>
            
            <!-- 物品栏 -->
            <div class="inventory">
                <div class="inv-slot">🪵</div>
                <div class="inv-count" id="woodCount">0 / 10</div>
            </div>
        </div>

        <a href="level5.html" class="next-btn" id="nextBtn">前往第5关 ️</a>
    </div>

<script>
    let woodCount = 0;
    const targetWood = 10;
    const tree = document.getElementById('treeBlock');
    const countDisplay = document.getElementById('woodCount');
    const hint = document.getElementById('hintText');

    function chopTree() {
        if (woodCount >= targetWood) return;

        woodCount++;
        countDisplay.innerText = `${woodCount} / ${targetWood}`;
        
        // 每次点击，树干颜色变深一点，模拟被砍
        const intensity = Math.max(50, 139 - (woodCount * 10));
        tree.style.background = `rgb(${intensity}, ${intensity / 2}, 0)`;
        
        // 提示文字变化
        if (woodCount < targetWood) {
            hint.innerText = `还差 ${targetWood - woodCount} 个木头！`;
        } else {
            hint.innerText = "你通关了";
            document.getElementById('nextBtn').style.display = 'inline-block';
        }
    }
</script>
</body>
</html>
