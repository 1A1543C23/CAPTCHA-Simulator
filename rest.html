<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第一大关休息区</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); /* 柔和的渐变色，让人放松 */
            font-family: 'Segoe UI', sans-serif;
            color: #444;
        }

        .rest-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 80%;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.1em;
            line-height: 1.6;
            color: #666;
        }

        .coffee-icon {
            font-size: 50px;
            margin: 20px 0;
            animation: float 3s ease-in-out infinite;
        }

        /* 简单的浮动动画 */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .status-box {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-weight: bold;
        }

        /* 暂时禁用的按钮样式 */
        .btn-disabled {
            background-color: #ccc;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            cursor: not-allowed;
            margin-top: 20px;
            text-decoration: none;
            display: inline-block;
        }
        
        /* 以后激活的按钮样式 */
        .btn-active {
            background-color: #4CAF50;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-active:hover {
            background-color: #45a049;
        }

    </style>
</head>
<body>

    <div class="rest-card">
        <div class="coffee-icon">☕</div>
        <h1>你已完成第一大关</h1>
        <p>恭喜你通过了前 5 关。<br>awa</p>
        
        <div class="status-box">
            当前进度：5 / ?<br>
            <span style="font-size: 0.9em; color: #888;">(开发者正在努力编写后续关卡...)</span>
        </div>

        <!-- 
           【开发者注意】：
           等你写好第6关后，把下面的 href="#" 改成 href="level6.html"
           并把 class 里的 btn-disabled 改成 btn-active
        -->
        <a href="Stage2.html" class="btn-disabled" onclick="alert('下一关还没写好呢')">
            前往第二大关（进去也是404）
        </a>
    </div>

</body>
</html>
