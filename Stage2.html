<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 核心代码在这里：content="0" 代表 0 秒后跳转 -->
    <meta http-equiv="refresh" content="0;url=Stage2-1.html">
    <title>正在进入第二大关...</title>
</head>
<body>
    <!-- 为了防止极少数浏览器不支持上面的 meta 标签，加一个 JS 作为双重保险 -->
    <script>
        window.location.href = "Stage2-1.html";
    </script>
    
    <!-- 给用户的提示（如果跳转失败才会看到） -->
    <p>如果页面没有自动跳转，<a href="Stage2-1.html">请点击这里</a></p>
</body>
</html>
